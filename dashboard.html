<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Fraud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #08090a;
      --surface: #0d0e10;
      --card:    #111214;
      --border:  #1c1d20;
      --accent:  #7c6fff;
      --text:    #f0f0f4;
      --muted:   #5e6070;
      --sans:    'Inter', system-ui, -apple-system, sans-serif;
      --green:   #3ba55c;
      --red:     #ed4245;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      opacity: 0.035;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      height: 58px;
      background: rgba(8,9,10,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: .55rem;
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.2px;
    }
    .nav-logo-mark {
      width: 26px; height: 26px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: .78rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .nav-links {
      display: flex;
      gap: 1.8rem;
      list-style: none;
      align-items: center;
    }
    .nav-links a {
      font-size: .85rem;
      font-weight: 500;
      color: var(--muted);
      transition: color .18s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-user {
      display: flex;
      align-items: center;
      gap: .65rem;
    }
    .nav-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .nav-username {
      font-size: .84rem;
      font-weight: 600;
      color: var(--text);
    }
    .nav-logout {
      font-size: .78rem;
      color: var(--muted);
      padding: .3rem .75rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: color .18s, border-color .18s;
      cursor: pointer;
    }
    .nav-logout:hover { color: var(--text); border-color: rgba(255,255,255,.2); }

    /* PAGE */
    .page {
      padding-top: 80px;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* LOGIN SCREEN */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 58px);
      text-align: center;
      padding: 4rem 5vw;
    }
    .login-logo {
      width: 64px; height: 64px;
      background: var(--accent);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      margin: 0 auto 2rem;
      box-shadow: 0 0 40px rgba(124,111,255,.3);
    }
    .login-screen h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-bottom: .75rem;
    }
    .login-screen p {
      color: var(--muted);
      font-size: .98rem;
      max-width: 38ch;
      margin-bottom: 2.4rem;
    }
    .btn-discord {
      display: inline-flex;
      align-items: center;
      gap: .65rem;
      background: #5865f2;
      color: #fff;
      padding: .85rem 1.8rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: .95rem;
      transition: transform .14s, box-shadow .14s, opacity .14s;
      box-shadow: 0 0 30px rgba(88,101,242,.3);
    }
    .btn-discord:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 44px rgba(88,101,242,.5);
      opacity: .94;
    }

    /* DASHBOARD */
    .dash-header {
      padding: 3rem 5vw 2rem;
      border-bottom: 1px solid var(--border);
    }
    .dash-header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -.5px;
    }
    .dash-header p {
      color: var(--muted);
      font-size: .9rem;
      margin-top: .3rem;
    }

    .dash-content { padding: 2.5rem 5vw 5rem; }

    .section-label {
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 1.2rem;
    }

    /* SERVER GRID */
    .servers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .server-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color .2s, transform .2s;
      cursor: default;
    }
    .server-card:hover {
      border-color: rgba(124,111,255,.35);
      transform: translateY(-2px);
    }
    .server-card.has-bot { border-color: rgba(124,111,255,.25); }

    /* Banner / icon area */
    .server-visual {
      position: relative;
      height: 90px;
      background: var(--surface);
      overflow: hidden;
    }
    .server-banner {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .server-banner-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .server-icon-wrap {
      position: absolute;
      bottom: -18px;
      left: 1.1rem;
    }
    .server-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      border: 3px solid var(--card);
      overflow: hidden;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      flex-shrink: 0;
    }
    .server-icon img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .server-body {
      padding: 1.5rem 1.1rem 1.1rem;
    }
    .server-name {
      font-size: .94rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: .25rem;
    }
    .server-meta {
      font-size: .78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .server-badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .7rem;
      font-weight: 600;
      padding: .18rem .55rem;
      border-radius: 999px;
    }
    .badge-bot {
      background: rgba(124,111,255,.12);
      color: var(--accent);
      border: 1px solid rgba(124,111,255,.25);
    }
    .badge-owner {
      background: rgba(240,180,41,.1);
      color: #f0b429;
      border: 1px solid rgba(240,180,41,.22);
    }
    .badge-admin {
      background: rgba(59,165,92,.1);
      color: var(--green);
      border: 1px solid rgba(59,165,92,.22);
    }
    .server-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: .8rem;
    }
    .server-badges { display: flex; gap: .35rem; flex-wrap: wrap; }
    .btn-manage {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-size: .75rem;
      font-weight: 600;
      color: var(--accent);
      padding: .3rem .8rem;
      border: 1px solid rgba(124,111,255,.3);
      border-radius: 999px;
      transition: background .18s, border-color .18s;
    }
    .btn-manage:hover {
      background: rgba(124,111,255,.1);
      border-color: rgba(124,111,255,.5);
    }
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted);
      padding: .3rem .8rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: color .18s, border-color .18s;
    }
    .btn-add:hover { color: var(--text); border-color: rgba(255,255,255,.2); }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,.04) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .skeleton-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .skeleton-visual { height: 90px; }
    .skeleton-body { padding: 1.5rem 1.1rem 1.1rem; }
    .skeleton-name { height: 14px; width: 65%; margin-bottom: .5rem; }
    .skeleton-meta { height: 11px; width: 40%; }

    /* TABS */
    .dash-tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      padding: .65rem 1rem;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .18s;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ERROR */
    .error-banner {
      background: rgba(237,66,69,.08);
      border: 1px solid rgba(237,66,69,.22);
      color: #ed4245;
      border-radius: 12px;
      padding: 1rem 1.3rem;
      font-size: .88rem;
      margin-bottom: 1.5rem;
    }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-size: .9rem;
    }
    .empty-state svg { margin: 0 auto 1rem; opacity: .3; }

    @media (max-width: 640px) {
      .nav-links { display: none; }
      .servers-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <!-- LOGIN STATE -->
  <div class="login-screen" id="loginScreen">

      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

  <div id="dashboardScreen" style="display:none;">

<script>
  const DISCORD_API = "https://discord.com/api/v10";
  const BOT_CLIENT_ID = "1515920241631297646";
  const INVITE_URL = `https://discord.com/oauth2/authorize?client_id=${BOT_CLIENT_ID}&permissions=8&integration_type=0&scope=bot+applications.commands`;
  const CDN = "https://cdn.discordapp.com";

  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.$?*|{}()[\]\\/+^]/g, '\\$&') + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : null;
  }

  function serverIconUrl(id, hash) {
    if (!hash) return null;
    const ext = hash.startsWith("a_") ? "gif" : "webp";
    return `${CDN}/icons/${id}/${hash}.${ext}?size=128`;
  }

  function serverBannerUrl(id, hash) {
    if (!hash) return null;
    const ext = hash.startsWith("a_") ? "gif" : "webp";
    return `${CDN}/banners/${id}/${hash}.${ext}?size=480`;
  }

  function userAvatarUrl(id, hash, discriminator) {
    if (hash) {
      const ext = hash.startsWith("a_") ? "gif" : "webp";
      return `${CDN}/avatars/${id}/${hash}.${ext}?size=64`;
    }
    return `${CDN}/embed/avatars/${Number(discriminator || 0) % 5}.png`;
  }

  function initials(name) {
    return name.replace(/[^\w\s]/g, ' ').trim().split(/\s+/).filter(Boolean)
      .slice(0, 2).map(w => w[0]).join('').toUpperCase() || name[0].toUpperCase();
  }

  function colorFromName(name) {
    const palette = ['#7c6fff','#3ba55c','#f0b429','#ed4245','#5865f2','#00b2ff','#e67e22','#9b59b6'];
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return palette[h % palette.length];
  }

  function ADMIN_PERM(permissions) {
    return (BigInt(permissions) & BigInt(0x8)) === BigInt(0x8);
  }

  function renderSkeletons(count = 8) {
    return Array.from({ length: count }).map(() => `
      <div class="skeleton-card">
        <div class="skeleton-visual skeleton"></div>
        <div class="skeleton-body">
          <div class="skeleton skeleton-name"></div>
          <div class="skeleton skeleton-meta"></div>
        </div>
      </div>`).join('');
  }

  function renderServer(guild, hasBot) {
    const bannerUrl = serverBannerUrl(guild.id, guild.banner);
    const iconUrl = serverIconUrl(guild.id, guild.icon);
    const isOwner = guild.owner;
    const isAdmin = guild.owner || ADMIN_PERM(guild.permissions);

    const visualContent = bannerUrl
      ? `<img class="server-banner" src="${bannerUrl}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'server-banner-placeholder\\' style=\\'background:${colorFromName(guild.name)};opacity:.25;\\'></div>'" />`
      : `<div class="server-banner-placeholder" style="background:${colorFromName(guild.name)}22;"></div>`;

    const iconContent = iconUrl
      ? `<img src="${iconUrl}" alt="${guild.name}" loading="lazy" onerror="this.outerHTML='<span style=\\'font-size:.9rem;font-weight:700;\\'>${initials(guild.name)}</span>'" />`
      : `<span style="font-size:.85rem;font-weight:700;color:#fff;">${initials(guild.name)}</span>`;

    const badges = [
      hasBot ? '<span class="server-badge badge-bot">✓ Fraud</span>' : '',
      isOwner ? '<span class="server-badge badge-owner">Owner</span>' : (isAdmin ? '<span class="server-badge badge-admin">Admin</span>' : ''),
    ].filter(Boolean).join('');

    const actionBtn = hasBot
      ? `<a href="${INVITE_URL}&guild_id=${guild.id}" target="_blank" rel="noopener noreferrer" class="btn-manage">Manage</a>`
      : `<a href="${INVITE_URL}&guild_id=${guild.id}" target="_blank" rel="noopener noreferrer" class="btn-add">+ Add Fraud</a>`;

    return `
      <div class="server-card ${hasBot ? 'has-bot' : ''}">
        <div class="server-visual">
          ${visualContent}
          <div class="server-icon-wrap">
            <div class="server-icon" style="background:${colorFromName(guild.name)};">
              ${iconContent}
            </div>
          </div>
        </div>
        <div class="server-body">
          <div class="server-name" title="${guild.name}">${guild.name}</div>
          <div class="server-footer">
            <div class="server-badges">${badges}</div>
            ${actionBtn}
          </div>
        </div>
      </div>`;
  }

  let allGuilds = [];
  let currentTab = 'all';

  function switchTab(btn, tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = tab;
    renderList();
  }

  function renderList() {
    const list = document.getElementById('serversList');
    let guilds = allGuilds;

    if (currentTab === 'bot') guilds = guilds.filter(g => g._hasBot);
    else if (currentTab === 'nbot') guilds = guilds.filter(g => !g._hasBot);

    if (guilds.length === 0) {
      list.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5-2 4-2 4 2 4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        <p>No servers found in this filter.</p>
      </div>`;
      return;
    }

    list.innerHTML = guilds.map(g => renderServer(g, g._hasBot)).join('');
  }

  async function loadDashboard(token) {
    const [userRes, guildsRes, botGuildsRes] = await Promise.all([
      fetch(`${DISCORD_API}/users/@me`, { headers: { Authorization: `Bearer ${token}` } }),
      fetch(`${DISCORD_API}/users/@me/guilds`, { headers: { Authorization: `Bearer ${token}` } }),
      fetch('/api/guilds/bot'),
    ]);

    if (userRes.status === 401 || guildsRes.status === 401) {
      document.cookie = 'discord_token=; Max-Age=0; path=/;';
      showLogin();
      return;
    }

    const user = await userRes.json();
    const guilds = await guildsRes.json();

    if (!Array.isArray(guilds)) {
      showError("Failed to load your servers. Try logging in again.");
      return;
    }

    let botGuildSet = new Set();
    if (botGuildsRes.ok) {
      const botData = await botGuildsRes.json();
      if (Array.isArray(botData.guild_ids)) {
        botGuildSet = new Set(botData.guild_ids);
      }
    }

    const adminGuilds = guilds
      .filter(g => g.owner || ADMIN_PERM(g.permissions))
      .sort((a, b) => {
        const aB = botGuildSet.has(a.id);
        const bB = botGuildSet.has(b.id);
        if (aB !== bB) return aB ? -1 : 1;
        return a.name.localeCompare(b.name);
      });

    adminGuilds.forEach(g => { g._hasBot = botGuildSet.has(g.id); });

    allGuilds = adminGuilds;

    const avatarUrl = userAvatarUrl(user.id, user.avatar, user.discriminator);
    document.getElementById('navAvatarImg').src = avatarUrl;
    document.getElementById('navUsername').textContent = user.global_name || user.username;
    document.getElementById('navUser').style.display = 'flex';

    document.getElementById('dashSubtitle').textContent =
      `${adminGuilds.length} server${adminGuilds.length !== 1 ? 's' : ''} where you have admin permissions.`;

    renderList();
  }

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboardScreen').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      showLogin();
      document.querySelector('.login-screen p').textContent =
        'Login failed. Please try again.';
      return;
    }

    const token = getCookie('discord_token');
    if (!token) {
      showLogin();
      return;
    }

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';

    const list = document.getElementById('serversList');
    list.innerHTML = renderSkeletons(8);

    try {
      await loadDashboard(token);
    } catch (err) {
      showError('Could not connect to Discord. Check your connection and try again.');
      list.innerHTML = '';
    }
  }

  init();
</script>
</body>
</html>
